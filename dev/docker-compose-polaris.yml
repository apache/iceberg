services:
  polaris:
    image: apache/polaris:latest
    container_name: iceberg-polaris
    networks:
      iceberg_net:
    ports:
      - 8181:8181
      - 8182:8182
    environment:
      - POLARIS_BOOTSTRAP_CREDENTIALS=POLARIS,root,s3cr3t
      - polaris.features."ALLOW_INSECURE_STORAGE_TYPES"=true
      - polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES"=["FILE","S3"]
      - polaris.features."ALLOW_OVERLAPPING_CATALOG_URLS"=true
      - polaris.readiness.ignore-severe-issues=true
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio
    container_name: iceberg-polaris-minio
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    ports:
      - 9001:9001
      - 9000:9000
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    command: ["server", "/data", "--console-address", ":9001"]

  mc:
    image: minio/mc
    container_name: iceberg-polaris-mc
    networks:
      iceberg_net:
    depends_on:
      - minio
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb minio/warehouse;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "

networks:
  iceberg_net:
