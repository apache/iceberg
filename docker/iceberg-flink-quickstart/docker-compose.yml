# Flink Quickstart with Apache Iceberg
#
# Usage:
#   docker compose -f docker/iceberg-flink-quickstart/docker-compose.yml up -d --build
#
# Connect to SQL client:
#   docker exec -it jobmanager ./bin/sql-client.sh
services:
  # Flink JobManager
  jobmanager:
    build: .
    hostname: jobmanager
    container_name: jobmanager
    depends_on:
      iceberg-rest:
        condition: service_healthy
    networks:
      iceberg_net:
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      start_period: 30s
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      S3_ENDPOINT: http://seaweedfs:8333

  # Flink TaskManager
  taskmanager:
    build: .
    hostname: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    networks:
      iceberg_net:
    command: taskmanager
    deploy:
      replicas: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      S3_ENDPOINT: http://seaweedfs:8333

  # Iceberg REST Catalog
  iceberg-rest:
    image: apache/iceberg-rest-fixture
    hostname: iceberg-rest
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    networks:
      iceberg_net:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://seaweedfs:8333
      CATALOG_S3_ACCESS__KEY__ID: admin
      CATALOG_S3_SECRET__ACCESS__KEY: password

  # SeaweedFS for S3-compatible object storage (mini mode)
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    hostname: seaweedfs
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
    networks:
      iceberg_net:
        aliases:
          - warehouse.seaweedfs
    command: "mini -dir=/data"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8333/status"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Create the warehouse bucket
  create-bucket:
    image: amazon/aws-cli:latest
    depends_on:
      seaweedfs:
        condition: service_healthy
    networks:
      iceberg_net:
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    entrypoint: |
      /bin/sh -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://warehouse;
      aws --endpoint-url http://seaweedfs:8333 s3api put-bucket-policy \
        --bucket warehouse \
        --policy '{
          \"Version\": \"2012-10-17\",
          \"Statement\": [{
            \"Sid\": \"public\",
            \"Effect\": \"Allow\",
            \"Principal\": \"*\",
            \"Action\": \"s3:*\",
            \"Resource\": [\"arn:aws:s3:::warehouse\", \"arn:aws:s3:::warehouse/*\"]
          }]
        }';
      "

networks:
  iceberg_net:
