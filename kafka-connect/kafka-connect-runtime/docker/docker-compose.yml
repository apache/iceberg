volumes:
  data: {}

services:
  seaweedfs:
    image: chrislusf/seaweedfs:4.16
    hostname: seaweedfs
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
    ports:
      - 8333:8333   # S3 API
      - 23646:23646 # Admin UI
    volumes:
      - data:/data
    command: "mini -dir=/data"

  create-bucket:
    image: amazon/aws-cli
    depends_on:
      - seaweedfs
    volumes:
      - data:/data
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: |
      /bin/sh -c "
      until aws --endpoint-url http://seaweedfs:8333 s3 mb s3://bucket 2>/dev/null; do echo '...waiting for SeaweedFS...' && sleep 1; done;
      aws --endpoint-url http://seaweedfs:8333 s3api put-bucket-policy \
        --bucket bucket \
        --policy '{
          \"Version\": \"2012-10-17\",
          \"Statement\": [{
            \"Sid\": \"public\",
            \"Effect\": \"Allow\",
            \"Principal\": \"*\",
            \"Action\": \"s3:*\",
            \"Resource\": [\"arn:aws:s3:::bucket\", \"arn:aws:s3:::bucket/*\"]
          }]
        }';
      "

  iceberg:
    image: apache/iceberg-rest-fixture
    depends_on:
      - create-bucket
    hostname: iceberg
    ports:
      - 8181:8181
    environment:
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://bucket/warehouse/
      - CATALOG_URI=jdbc:sqlite:file:/tmp/iceberg_rest_mode=memory
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://seaweedfs:8333
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - CATALOG_S3_ACCESS__KEY__ID=admin
      - CATALOG_S3_SECRET__ACCESS__KEY=password

  kafka:
    image: confluentinc/cp-kafka:7.8.1
    hostname: kafka
    ports:
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: E-JXLvCaTiaUYDb1LwZ1JQ

  connect:
    image: confluentinc/cp-kafka-connect:7.8.1
    depends_on:
      - kafka
    hostname: connect
    ports:
      - 8083:8083
    volumes:
      - ../build/install:/test/kafka-connect
    environment:
      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: kc
      CONNECT_CONFIG_STORAGE_TOPIC: kc-config
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: kc-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: kc-storage
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: false
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: false
      CONNECT_PLUGIN_PATH: /test/kafka-connect
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 500
