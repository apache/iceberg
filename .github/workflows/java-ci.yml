name: "Java CI"
on:
  push:
    branches:
    - 'main'
    - '0.*'
    - '1.*'
    - '2.*'
    tags:
    - 'apache-iceberg-**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      jvm_matrix: ${{ steps.plan.outputs.jvm_matrix }}
      run_java: ${{ steps.plan.outputs.run_java }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - id: plan
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        FULL_CI_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci') }}
      run: bash .github/scripts/plan-pr-ci.sh
    - name: Test CI planner
      run: bash .github/scripts/plan-pr-ci-test.sh

  core-tests:
    needs: plan
    if: needs.plan.outputs.run_java == 'true'
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix: ${{ fromJson(needs.plan.outputs.jvm_matrix) }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        # Read-only: java-ci's build-checks (17) is the global canonical writer.
        cache-read-only: true
    - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
    - run: ./gradlew check -DsparkVersions= -DflinkVersions= -DkafkaVersions= -Pquick=true -x javadoc -x spotlessCheck
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: test logs
        path: |
          **/build/testlogs

  build-checks:
    needs: plan
    if: needs.plan.outputs.run_java == 'true'
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix: ${{ fromJson(needs.plan.outputs.jvm_matrix) }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        # Writes cache on main; read-only otherwise.
        cache-read-only: ${{ !(github.ref == 'refs/heads/main' && matrix.jvm == 17) }}
    - run: ./gradlew -DallModules build -x test -x javadoc -x integrationTest

  build-javadoc:
    needs: plan
    if: needs.plan.outputs.run_java == 'true'
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix: ${{ fromJson(needs.plan.outputs.jvm_matrix) }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        # Read-only: java-ci's build-checks (17) is the global canonical writer.
        cache-read-only: true
    - run: ./gradlew -Pquick=true javadoc

  check-runtime-deps:
    needs: plan
    if: needs.plan.outputs.run_java == 'true'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: zulu
        java-version: 17
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        # Read-only: java-ci's build-checks (17) is the global canonical writer.
        cache-read-only: true
    - run: ./gradlew checkAllRuntimeDeps -q -DallModules=true
