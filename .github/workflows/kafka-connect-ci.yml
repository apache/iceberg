name: "Kafka Connect CI"
on:
  push:
    branches:
    - 'main'
    - '0.*'
    - '1.*'
    - '2.*'
    tags:
    - 'apache-iceberg-**'
  pull_request:
    paths-ignore:
    - '.github/ISSUE_TEMPLATE/**'
    - '.github/workflows/api-binary-compatibility.yml'
    - '.github/workflows/delta-conversion-ci.yml'
    - '.github/workflows/docs-ci.yml'
    - '.github/workflows/flink-ci.yml'
    - '.github/workflows/hive-ci.yml'
    - '.github/workflows/java-ci.yml'
    - '.github/workflows/jmh-benchmarks-ci.yml'
    - '.github/workflows/labeler.yml'
    - '.github/workflows/license-check.yml'
    - '.github/workflows/open-api.yml'
    - '.github/workflows/publish-snapshot.yml'
    - '.github/workflows/recurring-jmh-benchmarks.yml'
    - '.github/workflows/site-ci.yml'
    - '.github/workflows/spark-ci.yml'
    - '.github/workflows/stale.yml'
    - '.gitignore'
    - '.asf.yaml'
    - 'dev/**'
    - 'docker/**'
    - 'mr/**'
    - 'flink/**'
    - 'spark/**'
    - 'docs/**'
    - 'site/**'
    - 'open-api/**'
    - 'format/**'
    - '.gitattributes'
    - '**/README.md'
    - 'CONTRIBUTING.md'
    - '**/LICENSE'
    - '**/NOTICE'
    - 'doap.rdf'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  kafka-connect-tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-
    - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
    - run: |
        ./gradlew -DsparkVersions= -DflinkVersions= -DkafkaVersions=3 \
          :iceberg-kafka-connect:iceberg-kafka-connect-events:check \
          :iceberg-kafka-connect:iceberg-kafka-connect-transforms:check \
          :iceberg-kafka-connect:iceberg-kafka-connect:check \
          :iceberg-kafka-connect:iceberg-kafka-connect-runtime:check \
          -Pquick=true -x javadoc
    - uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: test logs
        path: |
          **/build/testlogs
    # ------------------------------------------------------------------
    # Trivy CVE scan (JVM 21 only — dependency CVEs are JVM-independent)
    #
    # Scans bundled jars for CRITICAL/HIGH vulnerabilities. This is
    # report-only and does NOT fail the build (exit-code: '0').
    # On push: results are uploaded as SARIF to GitHub's Security tab.
    # On PRs: results are printed to the CI log for visibility.
    # ------------------------------------------------------------------
    - name: Build Kafka Connect distribution for scanning
      if: matrix.jvm == 21
      run: |
        ./gradlew -DsparkVersions= -DflinkVersions= -DkafkaVersions=3 \
          :iceberg-kafka-connect:iceberg-kafka-connect-runtime:distZip \
          -Pquick=true -x test -x javadoc
    - name: Unpack distribution for scanning
      if: matrix.jvm == 21
      run: |
        mkdir -p /tmp/kafka-connect-scan
        unzip kafka-connect/kafka-connect-runtime/build/distributions/iceberg-kafka-connect-runtime-*.zip \
          -d /tmp/kafka-connect-scan
    - name: Run Trivy vulnerability scan
      if: matrix.jvm == 21
      uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
      with:
        scan-type: 'fs'
        scan-ref: '/tmp/kafka-connect-scan'
        scanners: 'vuln'
        severity: 'CRITICAL,HIGH'
        ignore-unfixed: true
        exit-code: '0'
    - name: Run Trivy vulnerability scan (SARIF)
      if: matrix.jvm == 21 && github.event_name == 'push'
      uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
      with:
        scan-type: 'fs'
        scan-ref: '/tmp/kafka-connect-scan'
        scanners: 'vuln'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        ignore-unfixed: true
        exit-code: '0'
    - name: Upload Trivy results to GitHub Security tab
      if: matrix.jvm == 21 && github.event_name == 'push'
      uses: github/codeql-action/upload-sarif@c4a7bc332abaec03596ff2803dd7f3ca3a238975 # v3
      with:
        sarif_file: 'trivy-results.sarif'
