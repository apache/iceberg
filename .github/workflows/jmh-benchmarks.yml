name: "JMH Benchmarks"
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repo name with owner, such as apache/iceberg'
        required: true
      ref:
        description: 'The branch name'
        required: true
      spark_version:
        description: 'The Spark version, such as 4.1'
        default: '4.1'
        required: true
      scala_version:
        description: 'The Scala version, such as 2.13'
        default: '2.13'
        required: true
      benchmarks:
        description: 'A list of comma-separated double-quoted Benchmark names, such as "IcebergSourceFlatParquetDataReadBenchmark", "IcebergSourceFlatParquetDataFilterBenchmark"'
        required: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      foundlabel: ${{ steps.set-matrix.outputs.foundlabel }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.inputs.repo }}
          ref: ${{ github.event.inputs.ref }}
          persist-credentials: false
      - id: set-matrix
        env:
          BENCHMARKS: ${{ github.event.inputs.benchmarks }}
        run: |
          matrix=$(echo "[$BENCHMARKS]" | jq '.[] | select(endswith("Benchmark")) | .')
          matrix=$(echo $matrix | sed 's/ /,/g' | sed 's/"/\"/g')
          echo "matrix=[$matrix]" >> $GITHUB_OUTPUT
          echo "foundlabel=$(echo "[$matrix]" | jq 'if . | length > 0 then true else false end')" >> $GITHUB_OUTPUT

  show-matrix:
    needs: matrix
    runs-on: ubuntu-24.04
    steps:
      - env:
          REPO: ${{ github.event.inputs.repo }}
          REF: ${{ github.event.inputs.ref }}
          BENCHMARKS: ${{ needs.matrix.outputs.matrix }}
          SPARK_VERSION: ${{ github.event.inputs.spark_version }}
          SCALA_VERSION: ${{ github.event.inputs.scala_version }}
          FOUND_LABEL: ${{ needs.matrix.outputs.foundlabel }}
        run: |
          echo "Repo: $REPO"
          echo "Ref: $REF"
          echo "Benchmarks: $BENCHMARKS"
          echo "Spark Version: $SPARK_VERSION"
          echo "Scala Version: $SCALA_VERSION"
          echo "Found Benchmarks? $FOUND_LABEL"

  run-benchmark:
    if: ${{ needs.matrix.outputs.foundlabel == 'true' }}
    needs: matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        benchmark: ${{ fromJson(needs.matrix.outputs.matrix) }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.event.inputs.repo }}
        ref: ${{ github.event.inputs.ref }}
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: zulu
        java-version: 17
    - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5 # zizmor: ignore[cache-poisoning] -- cache writes are restricted to the default branch by setup-gradle
    - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts

    - name: Run Benchmark
      env:
        SPARK_VERSION: ${{ github.event.inputs.spark_version }}
        SCALA_VERSION: ${{ github.event.inputs.scala_version }}
        BENCHMARK: ${{ matrix.benchmark }}
      run: ./gradlew -DsparkVersions=${SPARK_VERSION} -DscalaVersion=${SCALA_VERSION} :iceberg-spark:iceberg-spark-${SPARK_VERSION}_${SCALA_VERSION}:jmh -PjmhIncludeRegex=${BENCHMARK} -PjmhOutputPath=benchmark/${BENCHMARK}.txt

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      if: ${{ always() }}
      with:
        name: benchmark-${{ matrix.benchmark }}
        path: |
          **/benchmark/*.txt
