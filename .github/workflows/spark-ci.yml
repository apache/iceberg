name: "Spark CI"
on:
  push:
    branches:
    - 'main'
    - '0.*'
    - '1.*'
    - '2.*'
    tags:
    - 'apache-iceberg-**'
  pull_request:
    paths-ignore:
    - '.github/ISSUE_TEMPLATE/**'
    - '.github/workflows/api-binary-compatibility.yml'
    - '.github/workflows/delta-conversion-ci.yml'
    - '.github/workflows/docs-ci.yml'
    - '.github/workflows/flink-ci.yml'
    - '.github/workflows/hive-ci.yml'
    - '.github/workflows/java-ci.yml'
    - '.github/workflows/jmh-benchmarks-ci.yml'
    - '.github/workflows/kafka-connect-ci.yml'
    - '.github/workflows/cve-scan.yml'
    - '.github/workflows/labeler.yml'
    - '.github/workflows/license-check.yml'
    - '.github/workflows/open-api.yml'
    - '.github/workflows/pr-title-check.yml'
    - '.github/workflows/publish-snapshot.yml'
    - '.github/workflows/recurring-jmh-benchmarks.yml'
    - '.github/workflows/site-ci.yml'
    - '.github/workflows/stale.yml'
    - '.gitignore'
    - '.asf.yaml'
    - 'dev/**'
    - 'docker/**'
    - 'site/**'
    - 'mr/**'
    - 'flink/**'
    - 'kafka-connect/**'
    - 'docs/**'
    - 'open-api/**'
    - 'format/**'
    - '.gitattributes'
    - '**/README.md'
    - 'CONTRIBUTING.md'
    - '**/LICENSE'
    - '**/NOTICE'
    - 'doap.rdf'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  spark-test-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      spark-versions: ${{ steps.detect.outputs.spark-versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect Spark versions to test
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          all_versions=("3.5" "4.0" "4.1")
          selected_versions=()
          run_all=false

          add_version_for_path() {
            case "$1" in
              spark/v3.5/*)
                select_version "3.5"
                ;;
              spark/v4.0/*)
                select_version "4.0"
                ;;
              spark/v4.1/*)
                select_version "4.1"
                ;;
              *)
                return 1
                ;;
            esac
          }

          select_version() {
            if [[ "${#selected_versions[@]}" -gt 0 ]]; then
              for selected_version in "${selected_versions[@]}"; do
                if [[ "${selected_version}" == "$1" ]]; then
                  return
                fi
              done
            fi

            selected_versions+=("$1")
          }

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            run_all=true
          elif [[ -z "${BASE_SHA}" ]]; then
            echo "Missing pull request base SHA" >&2
            exit 1
          else
            while IFS= read -r changed_file; do
              if [[ -z "${changed_file}" ]]; then
                continue
              fi

              # Only exclusively version-scoped Spark changes narrow the matrix.
              # Shared or unknown paths keep the full Spark test matrix.
              if ! add_version_for_path "${changed_file}"; then
                run_all=true
                break
              fi
            done < <(git diff --name-only "${BASE_SHA}...HEAD")
          fi

          selected=()
          if [[ "${run_all}" == "true" ]]; then
            selected=("${all_versions[@]}")
          else
            for version in "${all_versions[@]}"; do
              if [[ "${#selected_versions[@]}" -gt 0 ]]; then
                for selected_version in "${selected_versions[@]}"; do
                  if [[ "${selected_version}" == "${version}" ]]; then
                    selected+=("${version}")
                  fi
                done
              fi
            done

            if [[ "${#selected[@]}" -eq 0 ]]; then
              selected=("${all_versions[@]}")
            fi
          fi

          entries=()
          for spark in "${selected[@]}"; do
            scalas=("2.13")
            if [[ "${spark}" == "3.5" ]]; then
              scalas=("2.12" "2.13")
            fi

            for jvm in 17 21; do
              for scala in "${scalas[@]}"; do
                for tests in core extensions; do
                  entries+=("{\"jvm\":${jvm},\"spark\":\"${spark}\",\"scala\":\"${scala}\",\"tests\":\"${tests}\"}")
                done
              done
            done
          done

          matrix="{\"include\":["
          separator=""
          for entry in "${entries[@]}"; do
            matrix+="${separator}${entry}"
            separator=","
          done
          matrix+="]}"

          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"
          echo "spark-versions=${selected[*]}" >> "${GITHUB_OUTPUT}"
          echo "Spark versions selected for CI: ${selected[*]}" >> "${GITHUB_STEP_SUMMARY}"

  spark-tests:
    needs: spark-test-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      # 20 is the Apache infra policy ceiling (https://infra.apache.org/github-actions-policy.html).
      # Keep matrix <= 20 jobs; exceeding it queues a second wave and slows CI.
      max-parallel: 20
      # Split iceberg-spark (core) from iceberg-spark-extensions/-runtime
      # so they run as concurrent jobs rather than serially in one job.
      matrix: ${{ fromJson(needs.spark-test-matrix.outputs.matrix) }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: ${{ matrix.jvm }}
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          # Read-only: java-ci's build-checks (17) is the global canonical writer.
          cache-read-only: true
      - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
      - name: Run tests
        env:
          MATRIX_SCALA: ${{ matrix.scala }}
          MATRIX_SPARK: ${{ matrix.spark }}
          MATRIX_TESTS: ${{ matrix.tests }}
        run: |
          if [[ "${MATRIX_TESTS}" == "core" ]]; then
            projects=(":iceberg-spark:iceberg-spark-${MATRIX_SPARK}_${MATRIX_SCALA}:check")
          else
            projects=(
              ":iceberg-spark:iceberg-spark-extensions-${MATRIX_SPARK}_${MATRIX_SCALA}:check"
              ":iceberg-spark:iceberg-spark-runtime-${MATRIX_SPARK}_${MATRIX_SCALA}:check"
            )
          fi
          ./gradlew -DsparkVersions="${MATRIX_SPARK}" -DscalaVersion="${MATRIX_SCALA}" -DflinkVersions= -DkafkaVersions= \
            "${projects[@]}" -Pquick=true -x javadoc -DtestParallelism=auto
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: test logs (${{ matrix.jvm }}, ${{ matrix.spark }}, ${{ matrix.scala }}, ${{ matrix.tests }})
          retention-days: 7
          path: |
            **/build/testlogs
