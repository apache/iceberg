name: "Delta Conversion CI"
on:
  push:
    branches:
      - 'main'
      - '0.*'
      - '1.*'
      - '2.*'
    tags:
      - 'apache-iceberg-**'
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/api-binary-compatibility.yml'
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/flink-ci.yml'
      - '.github/workflows/hive-ci.yml'
      - '.github/workflows/java-ci.yml'
      - '.github/workflows/jmh-benchmarks-ci.yml'
      - '.github/workflows/kafka-connect-ci.yml'
      - '.github/workflows/cve-scan.yml'
      - '.github/workflows/labeler.yml'
      - '.github/workflows/license-check.yml'
      - '.github/workflows/open-api.yml'
      - '.github/workflows/pr-title-check.yml'
      - '.github/workflows/publish-snapshot.yml'
      - '.github/workflows/recurring-jmh-benchmarks.yml'
      - '.github/workflows/site-ci.yml'
      - '.github/workflows/spark-ci.yml'
      - '.github/workflows/stale.yml'
      - '.gitignore'
      - '.asf.yaml'
      - 'dev/**'
      - 'docker/**'
      - 'mr/**'
      - 'flink/**'
      - 'kafka-connect/**'
      - 'docs/**'
      - 'site/**'
      - 'open-api/**'
      - 'format/**'
      - '.gitattributes'
      - '**/README.md'
      - 'CONTRIBUTING.md'
      - '**/LICENSE'
      - '**/NOTICE'
      - 'doap.rdf'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  delta-conversion-scala-2-12-tests:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
        event_name: ['${{ github.event_name }}']
        exclude:
          # Pull requests run the baseline JDK only.
          - event_name: pull_request
            jvm: 21
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: ${{ matrix.jvm }}
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Read-only: java-ci's build-checks (17) is the global canonical writer.
          cache-read-only: true
      - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
      - run: ./gradlew -DsparkVersions=3.5 -DscalaVersion=2.12 -DkafkaVersions= -DflinkVersions= :iceberg-delta-lake:check -Pquick=true -x javadoc
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: test logs
          path: |
            **/build/testlogs

  delta-conversion-scala-2-13-tests:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
        event_name: ['${{ github.event_name }}']
        exclude:
          # Pull requests run the baseline JDK only.
          - event_name: pull_request
            jvm: 21
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: ${{ matrix.jvm }}
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Read-only: java-ci's build-checks (17) is the global canonical writer.
          cache-read-only: true
      - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
      - run: ./gradlew -DsparkVersions=3.5 -DscalaVersion=2.13 -DkafkaVersions= -DflinkVersions= :iceberg-delta-lake:check -Pquick=true -x javadoc
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: test logs
          path: |
            **/build/testlogs
