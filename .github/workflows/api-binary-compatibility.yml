name: "API Binary Compatibility Checks"
on:
  push:
    branches:
      - '**'
      - '!main'
      - '!0.*'
      - '!1.*'
      - '!2.*'
    tags:
      - 'apache-iceberg-**'
    paths:
      - '.github/workflows/api-binary-compatibility.yml'
      - '*.gradle'
      - 'gradle*'
      - 'api/**'
      - '.palantir/revapi.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository == 'apache/iceberg' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  revapi:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          repository: apache/iceberg
          ref: main
      - name: Sync fork branch with upstream main
        if: github.repository != 'apache/iceberg'
        run: |
          git fetch https://github.com/$GITHUB_REPOSITORY.git ${GITHUB_REF#refs/heads/}
          git -c user.name='Apache Iceberg' -c user.email='iceberg-ci@apache.org' merge --no-commit --progress --squash FETCH_HEAD
          git -c user.name='Apache Iceberg' -c user.email='iceberg-ci@apache.org' commit -m "Merged commit" --allow-empty
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Read-only: small job; restore opportunistically from other jobs' caches but never write.
          cache-read-only: true
      - run: |
          echo "Using the old version tag, as per git describe, of $(git describe)";
      - run: ./gradlew revapi --rerun-tasks
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: test logs
          path: |
            **/build/testlogs
