name: "ASF Allowlist Check"
on:
  pull_request:
    paths:
      - '.github/**'

permissions:
  contents: read

jobs:
  allowlist-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # TODO: pin to @main after https://github.com/apache/infrastructure-actions/pull/587 is merged
      - uses: apache/infrastructure-actions/allowlist-check@aa2e2255f589df470b41dc8ed27fd06f753cac9e
