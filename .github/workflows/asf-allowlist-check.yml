name: "ASF Allowlist Check"

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asf-allowlist-check:
    name: "Check actions against ASF allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Download ASF approved patterns
        shell: bash
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/apache/infrastructure-actions/main/approved_patterns.yml" \
            -o /tmp/approved_patterns.yml
      - name: Verify all action refs are allowlisted
        shell: bash
        run: python3 .github/scripts/check_asf_allowlist.py /tmp/approved_patterns.yml