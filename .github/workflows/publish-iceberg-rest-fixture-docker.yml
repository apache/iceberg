name: Build and Push 'iceberg-rest-fixture' Docker Image

on:
  push:
    tags:
      - 'apache-iceberg-[0-9]+.[0-9]+.[0-9]+'
  schedule:
    - cron: '0 2 * * *' # run at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE_TAG: iceberg-rest-fixture
  DOCKER_IMAGE_VERSION: latest
  DOCKER_REPOSITORY: apache

jobs:
  build:
    if: github.repository_owner == 'apache'
    runs-on: ubuntu-latest
    environment: docker-publish
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: zulu
        java-version: 21
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        # Read-only: small job; restore opportunistically from other jobs' caches but never write.
        cache-read-only: true
    - name: Stage REST fixture image classpath
      run: ./gradlew :iceberg-open-api:stageRESTFixtureRuntime
    - name: Login to Docker Hub
      env:
        DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USER" --password-stdin
    - name: Set the tagged version
      # for tag 'apache-iceberg-1.7.1', publish image 'apache/iceberg-rest-fixture:1.7.1'
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      env:
        REF: ${{ github.ref }}
      run: |
        echo "DOCKER_IMAGE_VERSION=$(echo "$REF" | tr -d -c 0-9.)" >> "$GITHUB_ENV"
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build and Push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ./
        file: ./docker/iceberg-rest-fixture/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_TAG }}:${{ env.DOCKER_IMAGE_VERSION }}
